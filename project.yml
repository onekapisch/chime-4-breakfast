name: Chime4Breakfast
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 14.0
schemes:
  Chime4BreakfastApp:
    build:
      targets:
        Chime4BreakfastApp: all
        Chime4BreakfastTests: [test]
    test:
      targets:
        - Chime4BreakfastTests
targets:
  Chime4BreakfastApp:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    sources:
      - path: Sources/Chime4BreakfastApp
    resources:
      - path: Sources/Chime4BreakfastApp/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.chime4breakfast
        PRODUCT_NAME: Chime 4 Breakfast
        PRODUCT_MODULE_NAME: Chime4BreakfastApp
        EXECUTABLE_NAME: Chime4BreakfastApp
        MARKETING_VERSION: 1.2.0
        CURRENT_PROJECT_VERSION: 3
        VERSIONING_SYSTEM: apple-generic
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Chime 4 Breakfast
        INFOPLIST_KEY_CFBundleShortVersionString: "$(MARKETING_VERSION)"
        INFOPLIST_KEY_CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        INFOPLIST_KEY_LSUIElement: YES
        DEFINES_MODULE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        # Notarized Direct Distribution requires the Hardened Runtime. Enable it
        # for Release only so local Debug builds and the debugger are unaffected.
        # The app needs no hardened-runtime entitlement exceptions: reading other
        # apps via the Accessibility API is gated by the Accessibility permission
        # (TCC), not an entitlement, and audio playback needs none.
        Release:
          ENABLE_HARDENED_RUNTIME: YES
  Chime4BreakfastTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/Chime4BreakfastTests
    dependencies:
      - target: Chime4BreakfastApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Chime 4 Breakfast.app/Contents/MacOS/Chime4BreakfastApp"
        BUNDLE_LOADER: "$(TEST_HOST)"
