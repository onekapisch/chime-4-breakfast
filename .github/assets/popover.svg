<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="1240" viewBox="0 0 1240 1240" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="desk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a12"/><stop offset="1" stop-color="#050509"/>
    </linearGradient>
    <linearGradient id="pop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F0F17"/><stop offset="1" stop-color="#1A1424"/>
    </linearGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F6F7FB"/><stop offset="1" stop-color="#A7A9B4"/>
    </linearGradient>
    <radialGradient id="gCoral" gradientUnits="userSpaceOnUse" cx="300" cy="120" r="520">
      <stop offset="0" stop-color="#FF4D5E" stop-opacity="0.30"/><stop offset="1" stop-color="#FF4D5E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gMag" gradientUnits="userSpaceOnUse" cx="1000" cy="120" r="520">
      <stop offset="0" stop-color="#D946EF" stop-opacity="0.34"/><stop offset="1" stop-color="#D946EF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gBlue" gradientUnits="userSpaceOnUse" cx="320" cy="1180" r="620">
      <stop offset="0" stop-color="#4F7BFF" stop-opacity="0.30"/><stop offset="1" stop-color="#4F7BFF" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="card"><rect x="240" y="60" width="760" height="1140" rx="40"/></clipPath>
  </defs>

  <!-- desktop backdrop -->
  <rect width="1240" height="1240" fill="url(#desk)"/>

  <!-- popover card -->
  <g clip-path="url(#card)">
    <rect x="240" y="60" width="760" height="1140" fill="url(#pop)"/>
    <rect x="240" y="60" width="760" height="1140" fill="url(#gCoral)"/>
    <rect x="240" y="60" width="760" height="1140" fill="url(#gMag)"/>
    <rect x="240" y="60" width="760" height="1140" fill="url(#gBlue)"/>
  </g>
  <rect x="240" y="60" width="760" height="1140" rx="40" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="2"/>

  <!-- HEADER -->
  <g>
    <text x="288" y="150" font-family="Georgia, serif" font-size="46" font-weight="700" fill="#ffffff">Chime 4 Breakfast</text>
    <text x="288" y="188" font-size="22" fill="#C7D1FF" fill-opacity="0.82">Watching Codex + Claude</text>
    <rect x="832" y="106" width="120" height="44" rx="22" fill="#4F7BFF" fill-opacity="0.20" stroke="#ffffff" stroke-opacity="0.08"/>
    <circle cx="862" cy="128" r="7" fill="#7FA0FF"/>
    <text x="884" y="135" font-size="22" font-weight="600" fill="#ffffff">Live</text>
  </g>

  <!-- APPS -->
  <g>
    <rect x="264" y="218" width="712" height="200" rx="26" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="290" y="258" font-size="20" font-weight="700" letter-spacing="2" fill="#C7D1FF" fill-opacity="0.72">APPS</text>
    <!-- Codex -->
    <circle cx="300" cy="306" r="8" fill="#4F7BFF"/>
    <text x="324" y="300" font-size="27" font-weight="600" fill="#ffffff">Codex</text>
    <text x="324" y="326" font-size="19" font-family="Menlo, monospace" fill="#C7D1FF" fill-opacity="0.55">com.openai.codex</text>
    <rect x="892" y="288" width="58" height="34" rx="17" fill="#34C759"/><circle cx="933" cy="305" r="14" fill="#ffffff"/>
    <!-- Claude -->
    <circle cx="300" cy="378" r="8" fill="#4F7BFF"/>
    <text x="324" y="372" font-size="27" font-weight="600" fill="#ffffff">Claude</text>
    <text x="324" y="398" font-size="19" font-family="Menlo, monospace" fill="#C7D1FF" fill-opacity="0.55">com.anthropic.claudefordesktop</text>
    <rect x="892" y="360" width="58" height="34" rx="17" fill="#34C759"/><circle cx="933" cy="377" r="14" fill="#ffffff"/>
  </g>

  <!-- SOUNDS -->
  <g>
    <rect x="264" y="436" width="712" height="176" rx="26" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="290" y="476" font-size="20" font-weight="700" letter-spacing="2" fill="#C7D1FF" fill-opacity="0.72">SOUNDS</text>
    <text x="290" y="516" font-size="26" font-weight="600" fill="#ffffff">Completion</text>
    <text x="290" y="540" font-size="19" fill="#C7D1FF" fill-opacity="0.58">Soft finish cue</text>
    <rect x="724" y="494" width="138" height="40" rx="10" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="793" y="521" font-size="22" fill="#ffffff" text-anchor="middle">Wave</text>
    <rect x="876" y="494" width="74" height="40" rx="10" fill="#4F7BFF" fill-opacity="0.28" stroke="#ffffff" stroke-opacity="0.08"/>
    <path d="M905 506 L922 514 L905 522 Z" fill="#ffffff"/>
    <text x="290" y="576" font-size="26" font-weight="600" fill="#ffffff">Attention</text>
    <text x="290" y="600" font-size="19" fill="#C7D1FF" fill-opacity="0.58">Decision or blocker cue</text>
    <rect x="724" y="554" width="138" height="40" rx="10" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="793" y="581" font-size="22" fill="#ffffff" text-anchor="middle">Horn</text>
    <rect x="876" y="554" width="74" height="40" rx="10" fill="#FF4D5E" fill-opacity="0.28" stroke="#ffffff" stroke-opacity="0.08"/>
    <path d="M905 566 L922 574 L905 582 Z" fill="#ffffff"/>
  </g>

  <!-- SCREEN GLOW -->
  <g>
    <rect x="264" y="630" width="712" height="248" rx="26" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="290" y="670" font-size="20" font-weight="700" letter-spacing="2" fill="#C7D1FF" fill-opacity="0.72">SCREEN GLOW</text>
    <text x="290" y="700" font-size="19" fill="#C7D1FF" fill-opacity="0.58">Glow the display edges when a response lands</text>
    <rect x="892" y="650" width="58" height="34" rx="17" fill="#34C759"/><circle cx="933" cy="667" r="14" fill="#ffffff"/>
    <!-- completion color -->
    <text x="290" y="742" font-size="25" font-weight="600" fill="#ffffff">Completion</text>
    <text x="290" y="766" font-size="18" fill="#C7D1FF" fill-opacity="0.58">Edge color when a response settles</text>
    <rect x="836" y="724" width="40" height="40" rx="9" fill="#30D158" stroke="#ffffff" stroke-opacity="0.25"/>
    <rect x="892" y="724" width="58" height="40" rx="10" fill="#30D158" fill-opacity="0.20" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="921" y="751" font-size="22" fill="#ffffff" text-anchor="middle">✦</text>
    <!-- attention color -->
    <text x="290" y="804" font-size="25" font-weight="600" fill="#ffffff">Attention</text>
    <text x="290" y="828" font-size="18" fill="#C7D1FF" fill-opacity="0.58">Edge color for questions and blockers</text>
    <rect x="836" y="786" width="40" height="40" rx="9" fill="#FF453A" stroke="#ffffff" stroke-opacity="0.25"/>
    <rect x="892" y="786" width="58" height="40" rx="10" fill="#FF453A" fill-opacity="0.22" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="921" y="813" font-size="22" fill="#ffffff" text-anchor="middle">✦</text>
    <!-- intensity -->
    <text x="290" y="858" font-size="22" fill="#ffffff">Intensity</text>
    <rect x="430" y="848" width="520" height="8" rx="4" fill="#ffffff" fill-opacity="0.14"/>
    <rect x="430" y="848" width="380" height="8" rx="4" fill="#D946EF" fill-opacity="0.85"/>
    <circle cx="810" cy="852" r="14" fill="#ffffff"/>
  </g>

  <!-- RECENT -->
  <g>
    <rect x="264" y="896" width="712" height="214" rx="26" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="290" y="936" font-size="20" font-weight="700" letter-spacing="2" fill="#C7D1FF" fill-opacity="0.72">RECENT</text>
    <!-- item 1 -->
    <rect x="290" y="952" width="660" height="68" rx="16" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="312" cy="978" r="7" fill="#FF4D5E"/>
    <text x="334" y="985" font-size="22" font-weight="600" fill="#ffffff">Claude</text>
    <text x="430" y="985" font-size="20" fill="#C7D1FF" fill-opacity="0.42">•</text>
    <text x="448" y="985" font-size="20" font-weight="600" fill="#FF8A93">Attention</text>
    <text x="930" y="985" font-size="19" font-family="Menlo, monospace" fill="#C7D1FF" fill-opacity="0.6" text-anchor="end">9:41 AM</text>
    <text x="334" y="1010" font-size="19" fill="#C7D1FF" fill-opacity="0.84">Want me to apply the migration, or hold off?</text>
    <!-- item 2 -->
    <rect x="290" y="1028" width="660" height="68" rx="16" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="312" cy="1054" r="7" fill="#4F7BFF"/>
    <text x="334" y="1061" font-size="22" font-weight="600" fill="#ffffff">Codex</text>
    <text x="426" y="1061" font-size="20" fill="#C7D1FF" fill-opacity="0.42">•</text>
    <text x="444" y="1061" font-size="20" font-weight="600" fill="#7FA0FF">Completion</text>
    <text x="930" y="1061" font-size="19" font-family="Menlo, monospace" fill="#C7D1FF" fill-opacity="0.6" text-anchor="end">9:38 AM</text>
    <text x="334" y="1086" font-size="19" fill="#C7D1FF" fill-opacity="0.84">Done — tests pass and the build is green.</text>
  </g>

  <!-- footer -->
  <rect x="288" y="1130" width="250" height="52" rx="14" fill="#D946EF" fill-opacity="0.80"/>
  <text x="413" y="1163" font-size="23" font-weight="600" fill="#ffffff" text-anchor="middle">Pause Watching</text>
</svg>
